<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City News - MediaBuzz365</title>
<link rel="icon" href="/images/mediabuzz365.png" type="image/png">
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CITY-SPECIFIC STYLES ===== */
.container {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 16px;
}
.city-title {
  font-size: 28px;
  margin-bottom: 20px;
  color: #0a2463;
}
.top-news {
  width: 100%;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 22px rgba(0,0,0,.15);
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.2s;
}
.top-news:hover { transform: translateY(-2px); }
.top-news img {
  width: 100%;
  height: 360px;
  object-fit: cover;
}
.top-news .content { padding: 18px; }
.top-news h2 { font-size: 24px; margin: 10px 0; }
.top-news .time { color: #777; font-size: 13px; }

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.news-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
  transition: transform 0.2s;
  cursor: pointer;
}
.news-card:hover { transform: translateY(-4px); }
.news-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}
.news-card .content { padding: 12px; }
.news-card h3 { font-size: 16px; margin: 6px 0; }

.tag {
  display: inline-block;
  background: var(--red);
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
  margin-bottom: 6px;
}

/* LOAD MORE */
.load-more-wrap {
  text-align: center;
  margin: 30px 0 10px;
}
.load-more-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 12px 36px;
  border-radius: 8px;
  font-size: 15px;
  font-family: "Noto Sans Telugu", sans-serif;
  cursor: pointer;
  transition: background 0.2s;
}
.load-more-btn:hover { background: #1d4ed8; }
.load-more-btn:disabled { background: #94a3b8; cursor: default; }

@media(max-width:768px) {
  .news-grid { grid-template-columns: 1fr; }
  .top-news img { height: 220px; }
}
</style>
</head>

<body>

<!-- BREAKING NEWS TICKER -->
<div id="tickerBar" class="ticker-bar"></div>

<!-- TOP BAR -->
<div class="top-bar" id="topBar"></div>

<!-- MAIN NAVIGATION -->
<nav class="main-nav" id="mainNav"></nav>

<div class="container">
  <div class="city-title" id="cityTitle">Loading...</div>
  <div id="topNews"></div>
  <div class="news-grid" id="newsGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">మరిన్ని వార్తలు చూడండి</button>
  </div>
</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<script>
const API = window.location.origin;
let allData = [];
let visibleCount = 0;
const PAGE_SIZE = 9;

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
            .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getImage(news) {
  if (news.images && news.images.length > 0) return API + news.images[0];
  if (news.image)                             return API + news.image;
  return "/images/placeholder.svg";
}

const params = new URLSearchParams(window.location.search);
const city   = params.get("city");

const cityTitle    = document.getElementById("cityTitle");
const topNewsEl    = document.getElementById("topNews");
const newsGrid     = document.getElementById("newsGrid");
const loadMoreWrap = document.getElementById("loadMoreWrap");
const loadMoreBtn  = document.getElementById("loadMoreBtn");

if (!city) {
  cityTitle.textContent = "లేటెస్ట్ న్యూస్";
  newsGrid.innerHTML = "<p>దయచేసి నగరాన్ని ఎంచుకోండి</p>";
} else {
  cityTitle.textContent = city.replace(/_/g," ").toUpperCase() + " లేటెస్ట్ న్యూస్";
  loadCityNews();
}

async function loadCityNews() {
  try {
    const res  = await fetch(`${API}/api/news?city=${encodeURIComponent(city)}`);
    const data = await res.json();
    data.sort((a, b) => new Date(b.date) - new Date(a.date));

    topNewsEl.innerHTML = "";
    newsGrid.innerHTML  = "";

    if (!data.length) {
      newsGrid.innerHTML = "<p>No news available</p>";
      return;
    }

    allData = data;

    // Big top story
    const latest = data[0];
    topNewsEl.innerHTML = `
      <div class="top-news" onclick="openNews('${latest._id}')">
        <img src="${getImage(latest)}" alt="" loading="lazy">
        <div class="content">
          <span class="tag">${escapeHtml(latest.category)}</span>
          <h2>${escapeHtml(latest.title)}</h2>
          <div class="time">🕒 ${new Date(latest.date).toLocaleString("te-IN")}</div>
          <p>${escapeHtml(latest.description || "")}</p>
        </div>
      </div>
    `;

    visibleCount = 0;
    renderCards(PAGE_SIZE);

  } catch(err) {
    console.error(err);
    newsGrid.innerHTML = "<p style='color:red'>వార్తలు లోడ్ కాలేదు</p>";
  }
}

function renderCards(count) {
  const slice = allData.slice(1 + visibleCount, 1 + visibleCount + count);
  slice.forEach(n => {
    const card = document.createElement("div");
    card.className = "news-card";
    card.onclick   = () => openNews(n._id);
    card.innerHTML = `
      <img src="${getImage(n)}" alt="" loading="lazy">
      <div class="content">
        <span class="tag">${escapeHtml(n.category)}</span>
        <h3>${escapeHtml(n.title)}</h3>
        <small style="color:#777">🕒 ${new Date(n.date).toLocaleDateString("te-IN")}</small>
      </div>
    `;
    newsGrid.appendChild(card);
  });
  visibleCount += slice.length;

  const remaining = allData.length - 1 - visibleCount;
  if (remaining > 0) {
    loadMoreWrap.style.display = "block";
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = `మరిన్ని వార్తలు చూడండి (${remaining} మిగిలాయి)`;
  } else if (visibleCount > 0) {
    loadMoreWrap.style.display = "block";
    loadMoreBtn.textContent = "అన్ని వార్తలు చదివారు ✓";
    loadMoreBtn.disabled = true;
  }
}

function loadMore() {
  renderCards(PAGE_SIZE);
}

function openNews(id) {
  window.location.href = "news-detail.html?id=" + id;
}
</script>

<script src="header.js"></script>
<script src="footer.js"></script>

</body>
</html>
