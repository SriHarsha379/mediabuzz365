<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Category News - MediaBuzz365</title>
<link rel="icon" href="/images/mediabuzz365.png" type="image/png">
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== CATEGORY-SPECIFIC STYLES ===== */
.container {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 16px;
}
.category-title {
  font-size: 28px;
  margin-bottom: 20px;
  color: #0a2463;
}
.top-news {
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 8px 22px rgba(0,0,0,.15);
  margin-bottom: 30px;
  cursor: pointer;
  transition: transform 0.2s;
}
.top-news:hover { transform: translateY(-2px); }
.top-news img {
  width: 100%;
  height: 360px;
  object-fit: cover;
}
.top-news .content { padding: 18px; }
.top-news .content small { color: #64748b; font-size: 13px; }

.news-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}
.news-card {
  background: #fff;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
  cursor: pointer;
  transition: transform 0.2s;
}
.news-card:hover { transform: translateY(-4px); }
.news-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}
.news-card .content { padding: 12px; }
.news-card .content small { color: #64748b; font-size: 12px; }

.tag {
  background: var(--red);
  color: #fff;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 20px;
  display: inline-block;
  margin-bottom: 6px;
}

/* LOAD MORE */
.load-more-wrap {
  text-align: center;
  margin: 30px 0 10px;
}
.load-more-btn {
  background: var(--primary);
  color: #fff;
  border: none;
  padding: 12px 36px;
  border-radius: 8px;
  font-size: 15px;
  font-family: "Noto Sans Telugu", sans-serif;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.load-more-btn:hover { background: #1d4ed8; transform: translateY(-1px); }
.load-more-btn:disabled { background: #94a3b8; cursor: default; transform: none; }

/* SKELETON */
.skel-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 14px rgba(0,0,0,.08); }
.skel-card .skeleton-img { aspect-ratio: 16/9; }
.skel-card .skeleton-block { padding: 12px; }

@media(max-width:768px) {
  .news-grid { grid-template-columns: 1fr; }
  .top-news img { height: 220px; }
}
</style>
</head>

<body>

<!-- BREAKING NEWS TICKER -->
<div id="tickerBar" class="ticker-bar"></div>

<!-- TOP BAR -->
<div class="top-bar" id="topBar"></div>

<!-- MAIN NAVIGATION -->
<nav class="main-nav" id="mainNav"></nav>

<div class="container">
  <div class="category-title" id="categoryTitle">
    <div class="skeleton skeleton-text" style="height:28px;width:300px;"></div>
  </div>
  <div id="topNews"></div>
  <div class="news-grid" id="newsGrid">
    <!-- skeleton cards -->
    <div class="skel-card"><div class="skeleton skeleton-img"></div><div class="skeleton-block"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
    <div class="skel-card"><div class="skeleton skeleton-img"></div><div class="skeleton-block"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
    <div class="skel-card"><div class="skeleton skeleton-img"></div><div class="skeleton-block"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div></div>
  </div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button class="load-more-btn" id="loadMoreBtn" onclick="loadMore()">మరిన్ని వార్తలు చూడండి</button>
  </div>
</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<script>
const API = window.location.origin;
let allNewsData = [];
let visibleCount = 0;
const PAGE_SIZE = 9;

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
            .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function getImage(news) {
  if (news.images && news.images.length > 0) return API + news.images[0];
  if (news.image)                             return API + news.image;
  return "/images/placeholder.svg";
}

const params   = new URLSearchParams(location.search);
const category = params.get("category");
const search   = params.get("search");

const titleEl  = document.getElementById("categoryTitle");
const topNews  = document.getElementById("topNews");
const grid     = document.getElementById("newsGrid");
const loadMoreWrap = document.getElementById("loadMoreWrap");
const loadMoreBtn  = document.getElementById("loadMoreBtn");

// Build fetch URL
let fetchUrl = `${API}/api/news`;
if (search) {
  titleEl.textContent = `"${search}" కోసం వెతికిన ఫలితాలు`;
  fetchUrl += `?search=${encodeURIComponent(search)}`;
} else if (category) {
  titleEl.textContent = category.toUpperCase() + " న్యూస్";
  fetchUrl += `?category=${encodeURIComponent(category)}`;
} else {
  titleEl.textContent = "లేటెస్ట్ న్యూస్";
  fetchUrl = `${API}/api/news`;
}

fetch(fetchUrl)
  .then(r => r.json())
  .then(data => {
    grid.innerHTML = "";
    topNews.innerHTML = "";

    if (!data || !data.length) {
      grid.innerHTML = "<p>ఈ విభాగంలో వార్తలు లేవు</p>";
      return;
    }

    data.sort((a, b) => new Date(b.date) - new Date(a.date));
    allNewsData = data;

    // TOP BIG NEWS (first item)
    const latest = data[0];
    topNews.innerHTML = `
      <div class="top-news" onclick="openNews('${latest._id}')">
        <img src="${getImage(latest)}" alt="" loading="lazy">
        <div class="content">
          <span class="tag">${escapeHtml(latest.category)}</span>
          <h2>${escapeHtml(latest.title)}</h2>
          <small>🕒 ${new Date(latest.date).toLocaleString("te-IN")}</small>
          <p>${escapeHtml(latest.description || "")}</p>
        </div>
      </div>
    `;

    visibleCount = 0;
    renderCards(PAGE_SIZE);
  })
  .catch(() => {
    grid.innerHTML = "<p style='color:red'>వార్తలు లోడ్ కాలేదు</p>";
  });

function renderCards(count) {
  const slice = allNewsData.slice(1 + visibleCount, 1 + visibleCount + count);
  slice.forEach(n => {
    const card = document.createElement("div");
    card.className = "news-card";
    card.onclick = () => openNews(n._id);
    card.innerHTML = `
      <img src="${getImage(n)}" alt="" loading="lazy">
      <div class="content">
        <span class="tag">${escapeHtml(n.category)}</span>
        <h3>${escapeHtml(n.title)}</h3>
        <small>🕒 ${new Date(n.date).toLocaleDateString("te-IN")}</small>
      </div>
    `;
    grid.appendChild(card);
  });
  visibleCount += slice.length;

  // Show/hide load more
  const remaining = allNewsData.length - 1 - visibleCount;
  if (remaining > 0) {
    loadMoreWrap.style.display = "block";
    loadMoreBtn.disabled = false;
    loadMoreBtn.textContent = `మరిన్ని వార్తలు చూడండి (${remaining} మిగిలాయి)`;
  } else {
    // All items shown — hide button if nothing was rendered, show completion message otherwise
    loadMoreWrap.style.display = visibleCount > 0 ? "block" : "none";
    loadMoreBtn.textContent = "అన్ని వార్తలు చదివారు ✓";
    loadMoreBtn.disabled = true;
  }
}

function loadMore() {
  renderCards(PAGE_SIZE);
}

function openNews(id) {
  window.location.href = "news-detail.html?id=" + id;
}
</script>

<script src="header.js"></script>
<script src="footer.js"></script>

</body>
</html>
