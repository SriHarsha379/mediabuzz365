<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Media Buzz 365 - తెలుగు వార్తలు</title>
<link rel="icon" href="/images/mediabuzz365.png" type="image/png">
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== INDEX-SPECIFIC STYLES ===== */

/* 2-COLUMN LAYOUT */
.container {
  width: 100%;
  margin: 20px 0;
  padding: 0 24px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 24px;
}
.left-col {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* SECTION HEADER */
.section-head {
  background: var(--red);
  color: #fff;
  padding: 10px 16px;
  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-head::before { content: '▶'; font-size: 14px; }

/* TOP NEWS */
.top-news {
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.top-news-content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  padding: 16px;
}
.news-main { grid-column: 1 / -1; cursor: pointer; }
.news-main h3 { font-size: 20px; color: #111; }
.news-side { cursor: pointer; }
.news-side h4 { font-size: 15px; color: #333; }

/* TRENDING */
.trending {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  overflow: hidden;
}
.trending-content { padding: 16px; }
.trending-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.trending-item { cursor: pointer; }
.trending-item h4 { font-size: 14px; color: #333; }

/* RIGHT SIDEBAR */
.right-sidebar { display: flex; flex-direction: column; gap: 20px; }
.sidebar-section {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  overflow: hidden;
}
.sidebar-section h3 {
  background: var(--primary);
  color: #fff;
  padding: 10px 16px;
  font-size: 16px;
}
.sidebar-content { padding: 12px; }

/* AD / VIDEO BOX */
.ad-space {
  background: #f9fafb;
  border: 2px dashed #ddd;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  border-radius: 8px;
  position: relative;
}

/* SKELETON for top news */
.skel-main { margin-bottom: 8px; }
.skel-main .skeleton-img { aspect-ratio: 16/9; }
.skel-side .skeleton-img { aspect-ratio: 4/3; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  .container { grid-template-columns: 1fr; }
  .trending-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .container { padding: 0 12px; }
  .top-news-content { grid-template-columns: 1fr; }
  .trending-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- BREAKING NEWS TICKER -->
<div id="tickerBar" class="ticker-bar"></div>

<!-- TOP BAR -->
<div class="top-bar" id="topBar"></div>

<!-- MAIN NAVIGATION -->
<nav class="main-nav" id="mainNav"></nav>

<!-- MAIN CONTAINER -->
<div class="container">

  <!-- LEFT COLUMN -->
  <div class="left-col">

    <!-- TOP NEWS -->
    <section class="top-news">
      <h2 class="section-head">టాప్ న్యూస్</h2>
      <div class="top-news-content" id="topNewsContent">
        <!-- Skeleton -->
        <div class="news-main skel-main">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton skeleton-text"></div>
          <div class="skeleton skeleton-text short"></div>
        </div>
        <div class="news-side skel-side">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
        <div class="news-side skel-side">
          <div class="skeleton skeleton-img"></div>
          <div class="skeleton skeleton-text"></div>
        </div>
      </div>
    </section>

    <!-- TRENDING NEWS -->
    <section class="trending">
      <h2 class="section-head">ట్రెండింగ్ వార్తలు</h2>
      <div class="trending-content">
        <div class="trending-grid" id="trendingGrid">
          <!-- Skeleton -->
          <div class="trending-item">
            <div class="skeleton skeleton-img" style="aspect-ratio:4/3"></div>
            <div class="skeleton skeleton-text"></div>
          </div>
          <div class="trending-item">
            <div class="skeleton skeleton-img" style="aspect-ratio:4/3"></div>
            <div class="skeleton skeleton-text"></div>
          </div>
          <div class="trending-item">
            <div class="skeleton skeleton-img" style="aspect-ratio:4/3"></div>
            <div class="skeleton skeleton-text"></div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- RIGHT SIDEBAR -->
  <aside class="right-sidebar">

    <!-- BREAKING NEWS -->
    <div class="sidebar-section">
      <h3>బ్రేకింగ్ వార్తలు</h3>
      <div class="sidebar-content" id="breakingNews">
        <div class="sidebar-item">
          <div class="img-wrap skeleton" style="width:84px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
        </div>
        <div class="sidebar-item">
          <div class="img-wrap skeleton" style="width:84px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
        </div>
      </div>
    </div>

    <!-- VIDEO -->
    <div class="ad-space">
      <div style="position:relative;width:100%;">
        <img src="images/mediabuzz365.png"
             style="position:absolute;top:8px;right:8px;width:40px;z-index:5;border-radius:6px;"
             alt="MediaBuzz365">
        <iframe id="ytFrame" width="100%" height="170" src=""
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen style="border-radius:8px;"></iframe>
      </div>
      <a href="https://www.youtube.com/@mediabuzz365" target="_blank"
         style="text-decoration:none;text-align:center;">
        <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg"
             style="width:36px;height:36px;">
        <p style="margin-top:6px;font-weight:600;color:#dc2626;">Subscribe MediaBuzz365</p>
      </a>
    </div>

    <!-- MORE NEWS -->
    <div class="sidebar-section">
      <h3>మరిన్ని వార్తలు</h3>
      <div class="sidebar-content" id="moreNews">
        <div class="sidebar-item">
          <div class="img-wrap skeleton" style="width:84px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
        </div>
        <div class="sidebar-item">
          <div class="img-wrap skeleton" style="width:84px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text short"></div></div>
        </div>
      </div>
    </div>

  </aside>

</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<!-- SCRIPTS -->
<script src="header.js"></script>
<script src="footer.js"></script>
<script src="news.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>
/* ===== SOCKET.IO — real-time refresh ===== */
const socket = io();
socket.emit("join", "public");

socket.on("news:approved", () => {
  if (typeof loadAllNews === "function") loadAllNews();
});
socket.on("news:deleted", () => {
  if (typeof loadAllNews === "function") loadAllNews();
});

socket.on("connect", () => console.log("🟢 Socket:", socket.id));
socket.on("disconnect", () => console.log("🔴 Socket disconnected"));
</script>
<script>
/* ===== YOUTUBE VIDEO ===== */
fetch("/api/settings/youtube")
  .then(r => r.json())
  .then(link => {
    if (!link || !link.trim()) return;
    let videoId = null;
    if (link.includes("watch?v="))         videoId = link.split("v=")[1].split("&")[0];
    else if (link.includes("youtu.be/"))   videoId = link.split("youtu.be/")[1].split("?")[0];
    else if (link.includes("embed/"))      videoId = link.split("embed/")[1].split("?")[0];
    if (!videoId) return;
    document.getElementById("ytFrame").src =
      `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=1&rel=0`;
  })
  .catch(() => {});
</script>

</body>
</html>
