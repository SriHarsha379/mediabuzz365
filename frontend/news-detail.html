<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Details - MediaBuzz365</title>
<meta name="description" content="MediaBuzz365 - తెలుగు వార్తలు">
<meta property="og:site_name" content="MediaBuzz365">
<meta property="og:type" content="article">
<meta property="og:title" content="MediaBuzz365">
<meta property="og:description" content="తెలుగు వార్తలు">
<meta property="og:image" content="/images/mediabuzz365.png">
<link rel="icon" href="/images/mediabuzz365.png" type="image/png">
<link rel="stylesheet" href="common.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== NEWS DETAIL SPECIFIC ===== */

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 0 16px;
}

/* ARTICLE IMAGE */
.news-img {
  width: 100%;
  max-height: 600px;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 12px 30px rgba(0,0,0,.2);
  display: block;
  margin: 0 auto 20px;
  cursor: zoom-in;
  background: #fff;
}
.news-img.portrait {
  max-width: 500px;
  max-height: 700px;
}
.image-container {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

/* TEXT */
.news-title { font-size: 26px; margin: 16px 0; line-height: 1.4; }
.meta { color: #64748b; font-size: 13px; margin-bottom: 14px; }
.desc { font-size: 16px; line-height: 1.8; }

/* SHARE BAR */
.share-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 28px 0 10px;
  flex-wrap: wrap;
}
.share-bar span {
  font-weight: 600;
  font-size: 14px;
  color: #374151;
}
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  color: #fff;
  transition: opacity 0.2s, transform 0.15s;
}
.share-btn:hover { opacity: 0.88; transform: translateY(-1px); }
.share-btn.whatsapp { background: #25d366; }
.share-btn.twitter  { background: #1da1f2; }
.share-btn.facebook { background: #1877f2; }
.share-btn.copy     { background: #6b7280; cursor: pointer; }

/* ZOOM OVERLAY */
.img-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.92);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  cursor: zoom-out;
  padding: 20px;
}
.img-overlay img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
  object-fit: contain;
}

/* SKELETON for loading */
.article-skeleton { animation: shimmer 1.5s infinite linear; }

@media (max-width: 768px) {
  .news-img { max-height: 500px; }
  .news-img.portrait { max-width: 100%; max-height: 600px; }
  .news-title { font-size: 22px; }
  .share-bar { gap: 8px; }
  .share-btn { padding: 7px 12px; font-size: 13px; }
}
</style>
</head>

<body>

<!-- BREAKING NEWS TICKER -->
<div id="tickerBar" class="ticker-bar"></div>

<!-- TOP BAR -->
<div id="topBar" class="top-bar"></div>

<!-- MAIN NAVIGATION -->
<nav id="mainNav" class="main-nav"></nav>

<div class="container" id="newsBox">
  <!-- Images inserted here by JS -->
  <h1 id="title" class="news-title"></h1>
  <div class="meta" id="meta"></div>

  <!-- SHARE BAR (populated after article loads) -->
  <div class="share-bar" id="shareBar" style="display:none;">
    <span>Share:</span>
    <a id="waShare"  class="share-btn whatsapp" target="_blank" rel="noopener">📱 WhatsApp</a>
    <a id="twShare"  class="share-btn twitter"  target="_blank" rel="noopener">🐦 Twitter</a>
    <a id="fbShare"  class="share-btn facebook" target="_blank" rel="noopener">📘 Facebook</a>
    <button class="share-btn copy" onclick="copyLink()">🔗 Copy Link</button>
  </div>

  <p id="desc" class="desc"></p>
</div>

<!-- ZOOM OVERLAY -->
<div id="imgOverlay" class="img-overlay">
  <img id="zoomImg">
</div>

<!-- FOOTER -->
<footer id="footer"></footer>

<script>
const API = window.location.origin;
const id  = new URLSearchParams(location.search).get("id");

function checkImageOrientation(imgSrc) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve(img.height > img.width);
    img.onerror = () => resolve(false);
    img.src = imgSrc;
  });
}

fetch(`${API}/api/news/single/${id}`)
  .then(r => r.json())
  .then(async n => {

    // Update page title + OG tags
    document.title = n.title + " - MediaBuzz365";
    document.querySelector('meta[name="description"]').content         = n.description || n.title;
    document.querySelector('meta[property="og:title"]').content        = n.title;
    document.querySelector('meta[property="og:description"]').content  = n.description || n.title;
    if (n.images && n.images.length) {
      document.querySelector('meta[property="og:image"]').content = API + n.images[0];
    }

    // Title + meta
    document.getElementById("title").innerText = n.title;
    document.getElementById("desc").innerText  = n.description || "";
    document.getElementById("meta").innerText  =
      `📍 ${n.city || ""}  |  🕒 ${new Date(n.date).toLocaleString("te-IN")}`;

    // Share bar
    const pageUrl   = encodeURIComponent(location.href);
    const pageTitle = encodeURIComponent(n.title);
    document.getElementById("waShare").href = `https://api.whatsapp.com/send?text=${pageTitle}%20${pageUrl}`;
    document.getElementById("twShare").href = `https://twitter.com/intent/tweet?text=${pageTitle}&url=${pageUrl}`;
    document.getElementById("fbShare").href = `https://www.facebook.com/sharer/sharer.php?u=${pageUrl}`;
    document.getElementById("shareBar").style.display = "flex";

    // Images
    const newsBox = document.getElementById("newsBox");
    const title   = document.getElementById("title");

    if (n.images && n.images.length) {
      for (const img of n.images) {
        const fullSrc   = `${API}${img}`;
        const isPortrait = await checkImageOrientation(fullSrc);

        const container = document.createElement("div");
        container.className = "image-container";

        const imgEl = document.createElement("img");
        imgEl.src       = fullSrc;
        imgEl.className = isPortrait ? "news-img portrait" : "news-img";
        imgEl.onclick   = () => zoom(fullSrc);

        container.appendChild(imgEl);
        newsBox.insertBefore(container, title);
      }
    } else {
      const container = document.createElement("div");
      container.className = "image-container";
      const imgEl = document.createElement("img");
      imgEl.src       = "/images/placeholder.svg";
      imgEl.className = "news-img";
      container.appendChild(imgEl);
      newsBox.insertBefore(container, title);
    }
  })
  .catch(err => console.error("Article load error:", err));

/* ZOOM */
const overlay = document.getElementById("imgOverlay");
const zoomImg = document.getElementById("zoomImg");

function zoom(src) {
  zoomImg.src = src;
  overlay.style.display = "flex";
}
overlay.onclick = () => { overlay.style.display = "none"; };
document.addEventListener("keydown", e => {
  if (e.key === "Escape") overlay.style.display = "none";
});

/* COPY LINK */
function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    const btn = document.querySelector(".share-btn.copy");
    btn.textContent = "✅ Copied!";
    setTimeout(() => btn.textContent = "🔗 Copy Link", 2000);
  }).catch(() => {
    // Fallback: select the URL shown in a temporary input
    const inp = document.createElement("input");
    inp.value = location.href;
    inp.style.cssText = "position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:90%;max-width:500px;padding:10px;font-size:14px;border-radius:6px;border:1px solid #ccc;z-index:9999;";
    document.body.appendChild(inp);
    inp.focus();
    inp.select();
    setTimeout(() => inp.remove(), 4000);
  });
}
</script>

<script src="header.js"></script>
<script src="footer.js"></script>

</body>
</html>
